name: stats

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - env:
          GH_TOKEN: ${{ secrets.STATS_TOKEN || github.token }}
          HAS_PAT: ${{ secrets.STATS_TOKEN != '' }}
        run: |
          echo "personal token found: $HAS_PAT"
          python scripts/render_stats.py

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg
          git diff --cached --quiet || git commit -m "stats: refresh"
          git pull --rebase origin main
          git push

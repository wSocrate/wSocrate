name: stats

on:
  schedule:
    - cron: "17 3 * * *"   # chaque nuit à 03h17 UTC
  workflow_dispatch:        # + bouton "Run workflow" pour lancer à la main

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Régénérer la carte de stats
        env:
          # STATS_TOKEN (PAT classic, scope read:user) compte aussi les contributions privées ;
          # sans lui, on retombe sur le token du repo (public uniquement).
          GH_TOKEN: ${{ secrets.STATS_TOKEN || github.token }}
        run: python scripts/render_stats.py

      - name: Commit si la carte a changé
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg
          git diff --cached --quiet || git commit -m "stats: refresh"
          git push
